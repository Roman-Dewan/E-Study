<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - My Courses</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/courses.css">
</head>
<body class="full-width-page"> <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
            </div>
            <nav class="menu">
                <a href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html" class="active"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="resources.html"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="setting.html"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1>My Courses</h1>
                <div class="user-info">
                    <img src="https://via.placeholder.com/40" alt="Profile" style="border-radius: 50%;">
                </div>
            </header>

            <div class="section-header">
                <div class="tabs">
                    <span class="active">All Categories</span>
                    <span>Design</span>
                    <span>Development</span>
                </div>
                <div><i class="fa-solid fa-bars"></i> <i class="fa-solid fa-grid"></i></div>
            </div>

            <div class="course-grid">
                <div class="course-card" style="flex-direction: column; align-items: flex-start;">
                    <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                        <div class="icon orange"><i class="fa-solid fa-book"></i></div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    <h4>History of graphic design</h4>
                    <p style="font-size:11px; color:#999; margin-bottom:15px;">By William Joe</p>
                    <div class="progress-wrapper" style="width:100%">
                        <div class="progress-bar"><div class="fill" style="width: 100%; background:#41D185"></div></div>
                        <span style="font-size:11px; float:right; margin-top:5px;">Completed</span>
                    </div>
                </div>

                <div class="course-card" style="flex-direction: column; align-items: flex-start;">
                    <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                        <div class="icon blue"><i class="fa-solid fa-pen-nib"></i></div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    <h4>Graphic Design</h4>
                    <p style="font-size:11px; color:#999; margin-bottom:15px;">By William Joe</p>
                    <div class="progress-wrapper" style="width:100%">
                        <div class="progress-bar"><div class="fill" style="width: 100%; background:#41D185"></div></div>
                        <span style="font-size:11px; float:right; margin-top:5px;">Completed</span>
                    </div>
                </div>

                <div class="course-card" style="flex-direction: column; align-items: flex-start;">
                    <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                        <div class="icon" style="background:#9B59B6"><i class="fa-brands fa-figma"></i></div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    <h4>Sketching for Designers</h4>
                    <p style="font-size:11px; color:#999; margin-bottom:15px;">By William Joe</p>
                    <div class="progress-wrapper" style="width:100%">
                        <div class="progress-bar"><div class="fill" style="width: 34%;"></div></div>
                        <span style="font-size:11px; float:right; margin-top:5px;">34%</span>
                    </div>
                </div>

                 <div class="course-card" style="flex-direction: column; align-items: flex-start;">
                    <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                        <div class="icon" style="background:#34495E"><i class="fa-solid fa-mobile-screen"></i></div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    <h4>App Design Course</h4>
                    <p style="font-size:11px; color:#999; margin-bottom:15px;">By William Joe</p>
                    <div class="progress-wrapper" style="width:100%">
                        <div class="progress-bar"><div class="fill" style="width: 75%;"></div></div>
                        <span style="font-size:11px; float:right; margin-top:5px;">75%</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
