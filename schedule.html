<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/schedule.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
            </div>
            <nav class="menu">
                <a href="dashboard.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="resources.html"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html" class="active"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="setting.html"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1>Schedule</h1>
            </header>

            <div class="schedule-toolbar">
                <h2 id="month-year">Month Year</h2>
                <div>
                    <button
                        style="padding:5px 10px; border:1px solid #eee; background:white; border-radius:5px;">Monthly</button>
                    <i class="fa-solid fa-grid-2"></i>
                </div>
            </div>

            <div class="calendar-large">
                <div class="week-days-row">
                    <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
                </div>
                <div class="days-grid" id="days-grid">
                    <!-- Days generated by JS -->
                </div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="profile-header">
                <i class="fa-regular fa-bell"></i>
                <div class="user-info">
                    <img src="https://via.placeholder.com/40" alt="Martin">
                    <span>Martin nel</span>
                </div>
            </div>

            <button
                style="width:100%; padding:15px; background:var(--primary-color); color:white; border:none; border-radius:10px; cursor:pointer; margin-bottom:30px;">
                + Add New Task
            </button>

            <h3>Reminders</h3>
            <div class="task-card" style="margin-top:15px; background:white;">
                <div class="task-icon orange"><i class="fa-regular fa-envelope"></i></div>
                <div class="task-detail">
                    <h4>Web design test notice</h4>
                    <p>08:00 AM</p>
                </div>
            </div>
            <div class="task-card" style="margin-top:10px; background:white;">
                <div class="task-icon green"><i class="fa-solid fa-wallet"></i></div>
                <div class="task-detail">
                    <h4>Subscription Expires</h4>
                    <p>15:00 PM</p>
                </div>
            </div>

        </aside>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const date = new Date();
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            const currentMonth = date.getMonth(); // 0-11
            const currentYear = date.getFullYear();
            const currentDay = date.getDate();

            // Update Header
            document.getElementById('month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;

            const daysGrid = document.getElementById('days-grid');
            daysGrid.innerHTML = '';

            // First day of the month
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            // 0 = Sunday, 1 = Monday. Our grid starts Monday.
            // If Mon(1) -> 0 empty. If Sun(0) -> 6 empty.
            // Formula: (day + 6) % 7
            const emptyDays = (firstDay + 6) % 7;

            // Days in month
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Previous month days to fill gaps (optional, or just empty cells)
            // Sticking to empty cells (or just simple spans) as per request to fix active part primarily
            // But to look good, let's just put empty spans or previous month numbers if simple.
            // The visual showed numbers from prev month (29, 30). 
            // Let's just put empty spans for now to satisfy incorrect logic? No, let's make it correct.
            // If we want previous month days:
            const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

            for (let i = emptyDays - 1; i >= 0; i--) {
                const daySpan = document.createElement('span');
                daySpan.classList.add('faded'); // Add a class for styling if needed, or just text-grey
                daySpan.style.color = '#ccc';
                daySpan.innerText = prevMonthDays - i;
                daysGrid.appendChild(daySpan);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const daySpan = document.createElement('span');

                if (i === currentDay) {
                    // Create the active circle wrapper
                    daySpan.innerHTML = `<span class="active-day-circle">${i}</span>`;
                } else {
                    daySpan.innerText = i;
                }

                // Add some dummy events for visual parity if needed
                if (i === 10) { // Example fixed event
                    daySpan.innerHTML += `<div class="event-label green">Figma Prototype</div>`;
                }
                if (i === 23) {
                    daySpan.innerHTML += `<div class="event-label orange">Sketch Learning</div>`;
                }

                daysGrid.appendChild(daySpan);
            }

            // Fill remaining slots to make the grid look full (optional)
            const totalCells = emptyDays + daysInMonth;
            const remainingCells = 35 - totalCells > 0 ? 35 - totalCells : (42 - totalCells > 0 ? 42 - totalCells : 0);

            for (let i = 1; i <= remainingCells; i++) {
                const daySpan = document.createElement('span');
                daySpan.style.color = '#ccc';
                daySpan.innerText = i;
                daysGrid.appendChild(daySpan);
            }
        });
    </script>
</body>

</html>
