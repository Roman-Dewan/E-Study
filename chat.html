<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body class="chat-page"> <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
            </div>
            <nav class="menu">
                <a href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="resources.html"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html" class="active"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="setting.html"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </aside>

        <aside class="chat-sidebar">
            <h2>Chat</h2>
            <div class="chat-search-wrapper">
                <input type="text" id="chat-search-input" placeholder="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            
            <div class="chat-tabs">
                <button class="chat-tab active" id="tab-instructors">Instructors</button>
                <button class="chat-tab" id="tab-batches">Batches</button>
            </div>
            
            <div class="user-list" id="user-list">
                <!-- Users will be injected here via JS -->
            </div>
            
            <button class="fab-btn" id="fab-new-chat">
                <i class="fa-solid fa-plus"></i>
            </button>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <div class="chat-header-user">
                    <div class="avatar-container">
                        <span class="status-dot"></span>
                        <img src="https://ui-avatars.com/api/?name=Roman+Dewan&background=f0f0f0&color=333" class="header-avatar" id="chat-header-avatar" alt="Roman Dewan">
                    </div>
                    <h4 id="chat-header-name">Roman Dewan</h4>
                </div>
                <div class="chat-actions">
                    <i class="fa-solid fa-phone" id="action-phone"></i>
                    <i class="fa-solid fa-video" id="action-video"></i>
                    <i class="fa-solid fa-ellipsis-vertical" id="action-menu"></i>
                </div>
            </div>

            <div class="messages-box" id="messages-box">
                <!-- Messages will be rendered here dynamically -->
            </div>

            <div class="chat-input-area">
                <i class="fa-solid fa-ellipsis-vertical side-menu-icon" id="action-attach" style="color: #666; font-size: 18px; cursor: pointer;"></i>
                <div class="input-wrapper">
                    <i class="fa-regular fa-face-smile emoji-icon" id="action-emoji" style="color: #FF5A96;"></i>
                    <input type="text" id="message-input" placeholder="Type a message">
                    <button class="send-btn" id="message-send-btn">
                        <i class="fa-solid fa-paper-plane" style="color: #8C82FE;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals Overlay -->
    <div class="chat-modal-overlay" id="chat-modal-overlay" style="display: none;">
        <!-- Instructor Request Modal -->
        <div class="chat-modal" id="modal-instructor" style="display: none;">
            <div class="chat-modal-header">
                <h3>Find Instructors</h3>
                <i class="fa-solid fa-xmark close-modal"></i>
            </div>
            <div class="chat-modal-body">
                <div class="chat-search-wrapper" style="margin-bottom: 15px;">
                    <input type="text" id="modal-instructor-search" placeholder="Search by name...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div class="modal-list" id="modal-instructor-list">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Create Batch Group Modal -->
        <div class="chat-modal" id="modal-batch" style="display: none;">
            <div class="chat-modal-header">
                <h3>Create New Group</h3>
                <i class="fa-solid fa-xmark close-modal"></i>
            </div>
            <div class="chat-modal-body">
                <input type="text" id="modal-batch-name" class="modal-input" placeholder="Group Name (e.g. Study Group A)">
                
                <div class="chat-search-wrapper" style="margin: 15px 0;">
                    <input type="text" id="modal-batch-search" placeholder="Search members...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                
                <div class="modal-list" id="modal-batch-list" style="max-height: 200px;">
                    <!-- Dynamic content -->
                </div>
            </div>
            <div class="chat-modal-footer">
                <button class="primary-btn" id="btn-create-group">Create Group</button>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
