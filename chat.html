<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body class="chat-page"> <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
            </div>
            <nav class="menu">
                <a href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="resources.html"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html" class="active"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="setting.html"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </aside>

        <aside class="chat-sidebar">
            <h2>Chat</h2>
            <div class="chat-search-wrapper">
                <input type="text" placeholder="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            
            <div class="chat-tabs">
                <button class="chat-tab active">Instructors</button>
                <button class="chat-tab">Peers</button>
            </div>
            
            <div class="user-list">
                <div class="user-item active">
                    <div class="user-info-left">
                        <img src="https://ui-avatars.com/api/?name=Roman+Dewan&background=f0f0f0&color=333" class="user-avatar" alt="Roman Dewan">
                        <span class="user-name">Roman Dewan</span>
                    </div>
                    <span class="user-time">10:30</span>
                </div>

                <div class="user-item">
                    <div class="user-info-left">
                        <img src="https://ui-avatars.com/api/?name=Rifat+Hasan&background=f0f0f0&color=333" class="user-avatar" alt="Rifat Hasan">
                        <span class="user-name">Rifat Hasan</span>
                    </div>
                    <span class="user-time">9:30</span>
                </div>
                
                <div class="user-item">
                    <div class="user-info-left">
                        <img src="https://ui-avatars.com/api/?name=Akash&background=f0f0f0&color=333" class="user-avatar" alt="Akash">
                        <span class="user-name">Akash</span>
                    </div>
                    <span class="user-time">7:00</span>
                </div>

                <div class="user-item">
                    <div class="user-info-left">
                        <img src="https://ui-avatars.com/api/?name=Rashid&background=f0f0f0&color=333" class="user-avatar" alt="Rashid">
                        <span class="user-name">Rashid</span>
                    </div>
                    <span class="user-time">4:30</span>
                </div>
            </div>
            
            <button class="fab-btn">
                <i class="fa-solid fa-plus"></i>
            </button>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <div class="chat-header-user">
                    <div class="avatar-container">
                        <span class="status-dot"></span>
                        <img src="https://ui-avatars.com/api/?name=Roman+Dewan&background=f0f0f0&color=333" class="header-avatar" alt="Roman Dewan">
                    </div>
                    <h4>Roman Dewan</h4>
                </div>
                <div class="chat-actions">
                    <i class="fa-solid fa-phone"></i>
                    <i class="fa-solid fa-video"></i>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </div>

            <div class="messages-box">
                <!-- Received Message -->
                <div class="msg-container received">
                    <img src="https://ui-avatars.com/api/?name=Roman+Dewan&background=f0f0f0&color=333" class="msg-avatar" alt="User">
                    <div class="msg-content-wrapper">
                        <div class="msg-bubble">
                            <p>Hi.</p>
                        </div>
                        <span class="msg-time">30 mins ago</span>
                    </div>
                    <i class="fa-solid fa-ellipsis msg-menu"></i>
                </div>

                <!-- Sent Message -->
                <div class="msg-container sent">
                    <i class="fa-solid fa-ellipsis msg-menu"></i>
                    <div class="msg-content-wrapper">
                        <div class="msg-bubble">
                            <p>Hello.</p>
                        </div>
                        <span class="msg-time">25 mins ago</span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Me&background=41D185&color=fff" class="msg-avatar" alt="Me">
                </div>

                <!-- Received Message -->
                <div class="msg-container received">
                    <img src="https://ui-avatars.com/api/?name=Roman+Dewan&background=f0f0f0&color=333" class="msg-avatar" alt="User">
                    <div class="msg-content-wrapper">
                        <div class="msg-bubble">
                            <p>How are you?</p>
                        </div>
                        <span class="msg-time">20 mins ago</span>
                    </div>
                    <i class="fa-solid fa-ellipsis msg-menu"></i>
                </div>
            </div>

            <div class="chat-input-area">
                <i class="fa-solid fa-ellipsis-vertical side-menu-icon" style="color: #666; font-size: 18px;"></i>
                <div class="input-wrapper">
                    <i class="fa-regular fa-face-smile emoji-icon" style="color: #FF5A96;"></i>
                    <input type="text" placeholder="Type a message">
                    <button class="send-btn">
                        <i class="fa-solid fa-paper-plane" style="color: #8C82FE;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
