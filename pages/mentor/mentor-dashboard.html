<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Dashboard - Estudy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="mentor-dashboard.css">
</head>
<body class="full-width-page">
    <div class="app-container">
        <div id="sidebar-placeholder"></div>

        <main class="main">
            <!-- TOP BAR -->
            <header class="topbar">
                <div class="page-title">Mentor Dashboard</div>
                <div class="search-bar">
                    <input type="text" placeholder="Search resources or courses...">
                    <span>🔍</span>
                </div>
                <div class="header-right-profile">
                    <div class="notification-btn-wrapper">
                        <i class="fa-regular fa-bell" id="notification-btn"></i>
                    </div>
                    <div class="user-dropdown-container">
                        <div class="user-header" id="user-dropdown-toggle">
                            <img src="../../assets/images/blank-profile-picture-.webp" class="user-avatar-small" id="header-avatar" alt="Profile">
                            <span id="header-name">Mentor</span>
                            <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                        </div>
                        <div class="user-dropdown-menu" id="user-dropdown-menu">
                            <a href="../profile/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile Details</a>
                            <a href="#" class="dropdown-item"><i class="fa-solid fa-key"></i> Change Password</a>
                            <a href="#" class="dropdown-item logout-action"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="mentor-container">
                    <div class="tabs-header">
                        <div class="mentor-tabs">
                            <button class="mentor-tab active" data-tab="resource">
                                <i class="fa-solid fa-folder-open"></i> Resource
                            </button>
                            <button class="mentor-tab" data-tab="course">
                                <i class="fa-solid fa-graduation-cap"></i> Course
                            </button>
                        </div>
                    </div>

                    <div class="form-container card">
                        <!-- Resource Form -->
                        <form id="resource-form" class="mentor-form active">
                            <h3 class="form-title">Upload New Resource</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="res-title">Title</label>
                                    <input type="text" id="res-title" placeholder="Enter resource title" required>
                                </div>
                                <div class="form-group">
                                    <label for="res-type">Type</label>
                                    <select id="res-type" required>
                                        <option value="video">Video</option>
                                        <option value="pdf">PDF</option>
                                        <option value="note">Note</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="res-url">URL</label>
                                    <input type="url" id="res-url" placeholder="https://example.com/resource" required>
                                </div>
                                <div class="form-group">
                                    <label for="res-thumbnail">Thumbnail URL</label>
                                    <input type="url" id="res-thumbnail" placeholder="https://example.com/thumb.jpg">
                                </div>
                                <div class="form-group full-width">
                                    <label for="res-description">Description</label>
                                    <textarea id="res-description" rows="3" placeholder="Resource details..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label for="res-tags">Tags (comma separated)</label>
                                    <input type="text" id="res-tags" placeholder="class1, math, algebra">
                                </div>
                                <div class="form-group">
                                    <label for="res-category">Category</label>
                                    <input type="text" id="res-category" placeholder="e.g. Science">
                                </div>
                            </div>
                        </form>

                        <!-- Course Form -->
                        <form id="course-form" class="mentor-form">
                            <h3 class="form-title">Create New Course</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="course-name">Course Name</label>
                                    <input type="text" id="course-name" placeholder="Enter course name" required>
                                </div>
                                <div class="form-group">
                                    <label for="course-category">Category</label>
                                    <input type="text" id="course-category" placeholder="e.g. Design">
                                </div>
                                <div class="form-group">
                                    <label for="course-duration">Duration</label>
                                    <input type="text" id="course-duration" placeholder="e.g. 10 hours">
                                </div>
                                <div class="form-group">
                                    <label for="course-id">Course ID</label>
                                    <div class="input-with-action">
                                        <input type="text" id="course-id" placeholder="C-12345">
                                        <button type="button" id="gen-course-id" class="btn-small">Gen</button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="course-image">Course Image URL</label>
                                    <input type="url" id="course-image" placeholder="https://example.com/course.jpg">
                                </div>
                                <div class="form-group">
                                    <label for="course-price">Price ($)</label>
                                    <input type="number" id="course-price" placeholder="29.99" step="0.01">
                                </div>
                                <div class="form-group full-width">
                                    <label for="course-description">Description</label>
                                    <textarea id="course-description" rows="3" placeholder="Course syllabus and info..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label for="course-lesson">Lesson Info/Count</label>
                                    <input type="text" id="course-lesson" placeholder="e.g. 24 Lessons">
                                </div>
                                <div class="form-group">
                                    <label for="instructor-name">Instructor Name</label>
                                    <input type="text" id="instructor-name" readonly>
                                </div>
                            </div>
                        </form>

                        <div class="form-actions">
                            <button type="submit" form="resource-form" id="confirm-btn" class="btn-confirm">Confirm</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="../../js/sidebar.js"></script>
    <script type="module" src="../../js/header-sync.js"></script>
    <script type="module" src="mentor-dashboard.js"></script>
</body>
</html>
