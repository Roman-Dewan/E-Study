<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses – Estudy</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/sidebar.css">
  <link rel="stylesheet" href="courses.css">
</head>

<body class="full-width-page">
  <div class="app-container">
    <!-- SIDEBAR -->
    <div id="sidebar-placeholder"></div>

    <div class="main">
      <header class="top-header">
        <div class="header-left">
          <button class="mobile-toggle" id="mobile-sidebar-toggle">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="page-title">Course</div>
        </div>
        <div class="search-container">
          <div class="search-bar">
            <input type="text" placeholder="Search..." id="searchInput">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <div class="header-right">
          <div class="notification-btn-wrapper">
            <i class="fa-regular fa-bell" id="notification-btn"></i>
          </div>
          <div class="user-dropdown-container">
            <div class="user-header" id="user-dropdown-toggle">
              <img src="../../assets/images/blank-profile-picture-.webp" class="user-avatar-small" id="header-avatar" alt="Profile">
              <span id="header-name" class="user-name">rayhan</span>
              <i class="fa-solid fa-chevron-down dropdown-icon"></i>
            </div>
            <div class="user-dropdown-menu" id="user-dropdown-menu">
              <a href="../profile/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile Details</a>
              <a href="#" class="dropdown-item"><i class="fa-solid fa-key"></i> Change Password</a>
              <a href="#" class="dropdown-item logout-action"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
          </div>
        </div>
      </header>

      <div class="filters-bar">
        <button class="filter-btn">⚡ Filter</button>
        <div class="sort-select">
          Sort by: <select>
            <option>All Categories</option>
            <option>Technology</option>
            <option>Design</option>
            <option>Business</option>
            <option>Science</option>
          </select>
        </div>
        <div class="view-toggle">
          <button class="view-btn" id="listView">☰</button>
          <button class="view-btn active" id="gridView">⊞</button>
        </div>
      </div>

      <div class="content">
        <div class="courses-grid" id="coursesGrid"></div>
        <div class="pagination">
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn" style="letter-spacing:2px;font-size:10px">···</button>
          <button class="page-btn">67</button>
        </div>
      </div>
    </div>

  </div> <!-- End app-container -->
  <!-- Common Sidebar Logic -->
  <script type="module" src="../../js/sidebar.js"></script>
  <script type="module" src="../../js/header-sync.js"></script>
  <!-- Page Specific Logic -->
  <script type="module" src="courses.js"></script>
</body>

</html>
