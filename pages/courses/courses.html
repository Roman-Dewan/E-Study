<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses – Estudy</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/sidebar.css">
  <link rel="stylesheet" href="courses.css">
</head>

<body class="full-width-page">
  <div class="app-container">
    <!-- SIDEBAR -->
    <div id="sidebar-placeholder"></div>

    <div class="main">
      <div class="topbar">
        <div class="page-title">Course</div>
        <div class="search-bar">
          <input type="text" placeholder="Search..." id="searchInput">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="topbar-right">
          <button class="notif-btn"><i class="fa-solid fa-bell"></i></button>
          <div class="user-info">
            <img src="https://ui-avatars.com/api/?name=Rifat+Hossan&background=f0f0f0&color=333" class="avatar"
              alt="Rifat Hossan">
            <span class="user-name">Rifat Hossan</span>
          </div>
        </div>
      </div>

      <div class="filters-bar">
        <button class="filter-btn">⚡ Filter</button>
        <div class="sort-select">
          Sort by: <select>
            <option>All Categories</option>
            <option>Technology</option>
            <option>Design</option>
            <option>Business</option>
            <option>Science</option>
          </select>
        </div>
        <div class="view-toggle">
          <button class="view-btn" id="listView">☰</button>
          <button class="view-btn active" id="gridView">⊞</button>
        </div>
      </div>

      <div class="content">
        <div class="courses-grid" id="coursesGrid"></div>
        <div class="pagination">
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn" style="letter-spacing:2px;font-size:10px">···</button>
          <button class="page-btn">67</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      const firebaseConfig = {
        apiKey: "API_KEY",
        authDomain: "AUTH_DOMAIN",
        projectId: "PROJECT_ID",
        storageBucket: "STORAGE_BUCKET",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
      };
      // const app = initializeApp(firebaseConfig);
      // const db = getFirestore(app);
    </script>
  </div> <!-- End app-container -->
  <script src="../../js/sidebar.js"></script>
  <script src="courses.js"></script>
</body>

</html>
