<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses – Estudy</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/global.css">
  <link rel="stylesheet" href="../../css/sidebar.css">
  <link rel="stylesheet" href="../../css/courses-modal.css">
  <link rel="stylesheet" href="courses.css">
</head>

<body class="full-width-page">
  <div class="app-container">
    <!-- SIDEBAR -->
    <div id="sidebar-placeholder"></div>

    <div class="main">
      <header class="top-header">
        <div class="header-left">
          <button class="mobile-toggle" id="mobile-sidebar-toggle">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="page-title">My Courses</div>
        </div>
        <div class="search-container">
          <div class="search-bar">
            <input type="text" placeholder="Search my courses..." id="myCoursesSearch">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <div class="header-right">
          <div class="notification-btn-wrapper">
            <i class="fa-regular fa-bell" id="notification-btn"></i>
          </div>
          <div class="user-dropdown-container">
            <div class="user-header" id="user-dropdown-toggle">
              <img src="../../assets/images/blank-profile-picture-.webp" class="user-avatar-small" id="header-avatar" alt="Profile">
              <span id="header-name" class="user-name">Loading...</span>
              <i class="fa-solid fa-chevron-down dropdown-icon"></i>
            </div>
            <div class="user-dropdown-menu" id="user-dropdown-menu">
              <a href="../profile/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile Details</a>
              <a href="#" class="dropdown-item"><i class="fa-solid fa-key"></i> Change Password</a>
              <a href="#" class="dropdown-item logout-action"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
          </div>
        </div>
      </header>

      <div class="content">
        <section class="courses-section">
          <div class="courses-grid" id="myCoursesGrid">
              <!-- Loading state -->
              <p style="grid-column: 1/-1; text-align: center; padding: 50px;">Fetching your courses...</p>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- COURSE PROGRESS MODAL (Optional expansion) -->
  <div class="courses-modal-overlay" id="courseDetailModalOverlay">
      <div class="courses-modal" style="max-width: 600px;">
          <div class="modal-header">
              <h2 id="modalCourseName">Course Status</h2>
              <button class="close-modal" id="closeDetailModal">&times;</button>
          </div>
          <div id="modalCourseContent" style="margin-bottom: 25px;"></div>
          <div class="modal-actions">
              <button class="btn-action btn-enroll" id="continueLearningBtn">Continue Learning</button>
          </div>
      </div>
  </div>

  <script type="module" src="../../js/sidebar.js"></script>
  <script type="module" src="../../js/header-sync.js"></script>
  <script type="module" src="my-courses.js"></script>
</body>

</html>
