<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="resources.css">
</head>

<body class="full-width-page">

    <div class="app-container">
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            <header class="top-header" style="justify-content: flex-end;">
                <!-- Redundant header title and search removed as requested -->
            </header>

            <section class="resources-card">
                <div class="rc-header">
                    <h2>My Resources</h2>
                    <div class="header-right-profile" style="margin-bottom:0;">
                        <div class="notification-btn-wrapper">
                            <i class="fa-regular fa-bell" id="notification-btn"></i>
                        </div>
                        <div class="user-dropdown-container">
                            <div class="user-header" id="user-dropdown-toggle">
                                <img src="../../assets/images/blank-profile-picture-.webp" class="user-avatar-small" id="header-avatar" alt="Profile">
                                <span id="header-name">rayhan</span>
                                <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                            </div>
                            <div class="user-dropdown-menu" id="user-dropdown-menu">
                                <a href="../profile/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile Details</a>
                                <a href="#" class="dropdown-item"><i class="fa-solid fa-key"></i> Change Password</a>
                                <a href="#" class="dropdown-item logout-action"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Medium Navigation Tabs -->
                <div class="medium-tabs" id="mediumTabs">
                    <button class="medium-tab active" data-medium="Bangla Medium">Bangla Medium</button>
                    <button class="medium-tab" data-medium="English Version">English Version</button>
                    <button class="medium-tab" data-medium="English Medium">English Medium</button>
                    <button class="medium-tab" data-medium="Madrasa Medium">Madrasa Medium</button>
                    <button class="medium-tab" data-medium="Skill Development">Skill Development</button>
                </div>

                <div class="resource-container">
                    <!-- Classes Grid -->
                    <div class="classes-grid" id="classesGrid">
                        <!-- Class cards will be injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Reusable Modal (For Subjects, Chapters, and Video) -->
    <div class="modal-overlay" id="resourceModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Modal Title</h3>
                <button class="close-modal" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content (Grid of buttons or Video player) -->
            </div>
        </div>
    </div>

    <script type="module" src="../../js/sidebar.js"></script>
    <script type="module" src="../../js/header-sync.js"></script>
    <script type="module" src="resources.js"></script>

</body>

</html>
