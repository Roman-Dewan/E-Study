<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="resources.css">
</head>

<body class="full-width-page">

    <div class="app-container">
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            <header class="top-header" style="justify-content: flex-end;">
                <!-- Redundant header title and search removed as requested -->
            </header>

            <section class="resources-card">
                <div class="rc-header">
                    <h2>Resources Browser</h2>
                    <div class="header-right-profile" style="margin-bottom:0;">
                        <div class="notification-btn-wrapper">
                            <i class="fa-regular fa-bell" id="notification-btn"></i>
                        </div>
                        <div class="user-dropdown-container">
                            <div class="user-header" id="user-dropdown-toggle">
                                <img src="../../assets/images/blank-profile-picture-.webp" class="user-avatar-small" id="header-avatar" alt="Profile">
                                <span id="header-name">rayhan</span>
                                <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                            </div>
                            <div class="user-dropdown-menu" id="user-dropdown-menu">
                                <a href="../profile/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile Details</a>
                                <a href="#" class="dropdown-item"><i class="fa-solid fa-key"></i> Change Password</a>
                                <a href="#" class="dropdown-item logout-action"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Medium Navigation removed as requested -->

                <div class="resource-browser">
                    <!-- Classes Column -->
                    <div class="browser-column classes-column">
                        <div class="column-header">Classes</div>
                        <div class="column-content" id="classesList">
                            <!-- Injected -->
                        </div>
                    </div>

                    <!-- Subjects Column -->
                    <div class="browser-column subjects-column">
                        <div class="column-header">Subjects</div>
                        <div class="column-content" id="subjectsList">
                            <div class="empty-state">Select a class first</div>
                        </div>
                    </div>

                    <!-- Resources Area -->
                    <div class="resources-display">
                        <div class="display-header">
                            <div id="displayTitle">Resources</div>
                            <div class="search-mini">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input type="text" id="resSearch" placeholder="Search in this section...">
                            </div>
                        </div>
                        <div class="resources-grid" id="resourcesGrid">
                            <div class="empty-state-large">
                                <i class="fa-solid fa-graduation-cap"></i>
                                <p>Select a class and subject to view resources</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Video Overlay -->
    <div class="video-overlay" id="videoOverlay">
        <div class="overlay-backdrop"></div>
        <div class="video-container">
            <button class="close-video" id="closeVideo"><i class="fa-solid fa-xmark"></i></button>
            <div class="video-wrapper">
                <iframe id="videoIframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3 id="videoTitle">Video Title</h3>
                <p id="videoDesc">Description goes here</p>
            </div>
        </div>
    </div>

    <!-- Add Category Modal (Keep existing functionality) -->
    <div class="modal-overlay" id="popModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Title</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body-grid" id="modalBodyGrid">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script type="module" src="../../js/sidebar.js"></script>
    <script type="module" src="../../js/header-sync.js"></script>
    <script type="module" src="resources.js"></script>

</body>

</html>
