<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="schedule.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body class="schedule-page">
    <div class="app-background"></div>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>
        <!-- ── MAIN ── -->
        <main class="main-content">
            <!-- Schedule header removed to push calendar up -->
            <div class="calendar-large">
                <div class="schedule-toolbar">
                    <h2>Schedule</h2>
                    <div class="toolbar-actions">
                        <span id="main-month-year">July 2020</span>
                        <div style="position: relative;">
                            <button class="btn-monthly" onclick="toggleMonthPicker()">Months <i class="fa-solid fa-chevron-down"></i></button>
                            <div id="monthPickerDropdown" class="month-picker-dropdown hidden">
                                <!-- Filled by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="horizontal-calendar">
                    <i class="fa-solid fa-chevron-left nav-arrow" onclick="scrollDays(-1)"></i>
                    <div class="days-strip" id="days-strip">
                        <!-- Filled by JS -->
                    </div>
                    <i class="fa-solid fa-chevron-right nav-arrow" onclick="scrollDays(1)"></i>
                </div>

                <div class="schedule-grid-container" id="schedule-grid-container">
                    <div class="time-column" id="time-column">
                        <!-- Filled by JS (10:00 to 18:00) -->
                    </div>
                    <div class="schedule-grid" id="schedule-grid">
                        <div class="grid-lines" id="grid-lines">
                            <!-- Filled by JS -->
                        </div>
                        <div class="events-container" id="events-container">
                            <!-- Filled by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <div class="header-right-profile">
                <div class="notification-btn-wrapper">
                    <i class="fa-regular fa-bell" id="notification-btn"></i>
                </div>
                <div class="user-dropdown-container">
                    <div class="user-header" id="user-dropdown-toggle">
                        <img src="../../assets/images/blank-profile-picture-.webp" class="user-avatar-small" id="header-avatar" alt="Profile">
                        <span id="header-name">rayhan</span>
                        <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                    </div>
                    <div class="user-dropdown-menu" id="user-dropdown-menu">
                        <a href="../profile/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile Details</a>
                        <a href="#" class="dropdown-item"><i class="fa-solid fa-key"></i> Change Password</a>
                        <a href="#" class="dropdown-item logout-action"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                    </div>
                </div>
            </div>

            <div class="mini-calendar">
                <div class="calendar-header">
                    <h3 id="mini-month-year">June 28 Monday</h3>
                    <div class="nav">
                        <i class="fa-solid fa-chevron-left" onclick="changeMiniMonth(-1)"></i>
                        <i class="fa-solid fa-chevron-right" onclick="changeMiniMonth(1)"></i>
                    </div>
                </div>
                <div class="week-days">
                    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                </div>
                <div class="days-grid" id="mini-days-grid">
                    <!-- Filled by JS -->
                </div>
            </div>

            <button class="btn-add-task" onclick="openTaskModal()">
                + Add New Task
            </button>

            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-circle blue">
                        <span id="stat-progress">08</span>
                    </div>
                    <p>Course in progress</p>
                </div>
                <div class="stat-item">
                    <div class="stat-circle green">
                        <span id="stat-complete">23</span>
                    </div>
                    <p>Course Complere</p>
                </div>
            </div>

            <div class="reminders-section">
                <h3>Reminders</h3>
                <div id="reminders-list">
                    <!-- Filled by JS -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeTaskModal()">&times;</span>
            <h2>Add New Task</h2>
            <div class="form-group">
                <label>Task Name</label>
                <input type="text" id="taskTitle" placeholder="e.g. Figma Prototype Class">
            </div>
            <div class="form-group row">
                <div class="col">
                    <label>Date</label>
                    <div style="position: relative;">
                        <input type="date" id="taskDate">
                        <i class="fa-regular fa-calendar" onclick="if(window.datePicker) window.datePicker.open()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #555; cursor: pointer; font-size: 16px; background: white; padding-left: 5px; z-index: 10; pointer-events: auto;"></i>
                    </div>
                </div>
                <div class="col">
                    <label>Start Time</label>
                    <input type="time" id="taskStartTime" value="10:00">
                </div>
                <div class="col">
                    <label>End Time</label>
                    <input type="time" id="taskEndTime" value="11:00">
                </div>
            </div>
             <div class="form-group">
                <label>Theme Color</label>
                <select id="taskTheme">
                    <option value="green">Green (Default)</option>
                    <option value="orange">Orange</option>
                    <option value="purple">Purple</option>
                </select>
            </div>
            <div class="form-group">
                <label>Gmail For Notification</label>
                <input type="email" id="taskEmail" placeholder="your.email@gmail.com">
            </div>
            <button class="btn-save" onclick="saveTask()">Save Task</button>
        </div>
    </div>

    <!-- Custom Notification Popup -->
    <div id="customNotification" class="custom-notification hidden">
        <i class="fa-solid fa-envelope-circle-check"></i>
        <span id="notificationMessage">Notification sent to gmail!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../../js/sidebar.js"></script>
    <script type="module" src="../../js/header-sync.js"></script>
    <script type="module" src="schedule.js"></script>
</body>
</html>
