<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/resources.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
                <p>Learn From Home</p>
            </div>

            <nav class="menu">
                <a href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="resources.html" class="active"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="setting.html"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>

            <div class="sidebar-footer">
                <div class="upgrade-card">
                    <img src="https://via.placeholder.com/80x100?text=Girl" alt="User" class="upgrade-img">
                    <p>Upgrade to PRO for more resources</p>
                    <button class="btn-upgrade">Upgrade Now</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div style="display:flex; align-items:center; gap:20px;">
                    <h2 style="font-size: 24px; font-weight: 600; color: var(--text-dark);">Resource</h2>
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
                <div class="profile-header" style="margin-bottom:0;">
                    <i class="fa-regular fa-bell"
                        style="font-size: 20px; color: var(--text-grey); cursor: pointer;"></i>
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=Darul+Islam&background=f0f0f0&color=333" width="40"
                            height="40" alt="Darul Islam">
                        <span>Darul Islam</span>
                        <i class="fa-solid fa-caret-down" style="cursor: pointer; margin-left: 5px;"></i>
                    </div>
                </div>
            </header>

            <section class="resources-card">
                <div class="rc-header">
                    <h2>My Resources</h2>
                    <button class="btn-primary"><i class="fa-solid fa-plus"></i> Add New Category</button>
                </div>

                <div class="rc-horizontal-nav" id="mediumNav">
                    <button class="nav-btn active" data-medium="Bangla Medium">Bangla Medium</button>
                    <button class="nav-btn" data-medium="English Version">English Version</button>
                    <button class="nav-btn" data-medium="English Medium">English Medium</button>
                    <button class="nav-btn" data-medium="Madrasa Medium">Madrasa Medium</button>
                    <button class="nav-btn" data-medium="Skill Development">Skill Development</button>
                </div>

                <hr class="rc-divider">

                <div class="classes-grid" id="mainContentGrid">
                    <!-- Dynamic classes injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Popups -->
    <div class="modal-overlay" id="popModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Title</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body-grid" id="modalBodyGrid">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script>
        const classesData = {
            "Bangla Medium": ["Play", "Nursery", "Zero", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", "Class 11", "Class 12", "University Admission"],
            "English Version": ["Play", "Nursery", "Zero", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", "Class 11", "Class 12", "University Admission"],
            "English Medium": ["Zero", "Nursery", "Play", "Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "Level 6", "Level 7", "Level 8", "Level 9", "O Level", "A Level"],
            "Madrasa Medium": ["Play", "Nursery", "Zero", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", "Class 11", "Class 12", "University Admission"],
            "Skill Development": ["Web Development", "Graphic Design", "Digital Marketing", "Spoken English", "Video Editing", "Python Programming"]
        };

        const subjectsList = ["Bangla", "English", "Mathematics", "Science", "BDGS", "Religion", "ICT"];
        const skillSubjects = ["Basic Concepts", "Advanced Topics", "Projects", "Resources"];
        const chaptersList = ["Chapter 1", "Chapter 2", "Chapter 3", "Chapter 4", "Chapter 5", "Chapter 6"];

        document.addEventListener('DOMContentLoaded', () => {
            const mediumBtns = document.querySelectorAll('#mediumNav .nav-btn');
            const mainGrid = document.getElementById('mainContentGrid');
            const modalOverlay = document.getElementById('popModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBodyGrid');
            const closeModalBtn = document.querySelector('.close-modal');

            let currentMedium = "Bangla Medium";
            let currentClass = "";
            let currentSubject = "";

            function renderClasses() {
                mainGrid.innerHTML = '';
                const list = classesData[currentMedium] || [];
                list.forEach(cls => {
                    const btn = document.createElement('button');
                    btn.className = 'dd-btn';
                    btn.innerHTML = `${cls} <i class="fa-solid fa-caret-right dd-arrow"></i>`;
                    btn.onclick = () => openSubjectsPopup(cls);
                    mainGrid.appendChild(btn);
                });
            }

            mediumBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    mediumBtns.forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentMedium = e.currentTarget.getAttribute('data-medium');
                    renderClasses();
                });
            });

            function openModal(title, contentHTML, isLink = false) {
                modalTitle.textContent = title;
                modalBody.innerHTML = contentHTML;
                modalBody.style.display = isLink ? 'block' : 'grid';
                modalOverlay.classList.add('active');
            }

            closeModalBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('active');
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                }
            });

            function openSubjectsPopup(cls) {
                currentClass = cls;
                const subs = currentMedium === "Skill Development" ? skillSubjects : subjectsList;
                let html = '';
                subs.forEach(sub => {
                    html += `<button class="dd-btn" onclick="openChaptersPopup('${sub}')">${sub} <i class="fa-solid fa-caret-right dd-arrow"></i></button>`;
                });
                openModal(`Subjects for ${cls}`, html);
            }

            window.openChaptersPopup = function(sub) {
                currentSubject = sub;
                let html = '';
                chaptersList.forEach(chap => {
                    html += `<button class="dd-btn" onclick="openLinkPopup('${chap}')">${chap} <i class="fa-solid fa-caret-right dd-arrow"></i></button>`;
                });
                openModal(`Chapters for ${sub}`, html);
            }

            window.openLinkPopup = function(chap) {
                const safeClass = currentClass.replace(/\s+/g, '').toLowerCase();
                const safeSub = currentSubject.replace(/\s+/g, '').toLowerCase();
                const safeChap = chap.replace(/\s+/g, '').toLowerCase();
                const link = `https://www.youtube.com/easytechnique/${safeClass}/${safeSub}/${safeChap}`;
                
                const html = `
                    <div class="lecture-link-box">
                        <i class="fa-solid fa-link" style="color: var(--primary-color); font-size: 24px; margin-bottom: 10px; display: block;"></i>
                        <p style="margin-bottom: 5px; font-weight: 500;">Lecture Link for ${chap}</p>
                        <a href="${link}" target="_blank">${link}</a>
                    </div>
                `;
                openModal(`${chap} - ${currentSubject}`, html, true);
            }

            // Init
            renderClasses();
        });
    </script>

</body>

</html>
