<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/resources.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
                <p>Learn From Home</p>
            </div>

            <nav class="menu">
                <a href="dashboard.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="resources.html" class="active"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                <a href="setting.html"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>

            <div class="sidebar-footer">
                <div class="upgrade-card">
                    <img src="https://via.placeholder.com/80x100?text=Girl" alt="User" class="upgrade-img">
                    <p>Upgrade to PRO for more resources</p>
                    <button class="btn-upgrade">Upgrade Now</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div style="display:flex; align-items:center; gap:20px;">
                    <h2 style="font-size: 24px; font-weight: 600; color: var(--text-dark);">Resource</h2>
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
                <div class="profile-header" style="margin-bottom:0;">
                    <i class="fa-regular fa-bell"
                        style="font-size: 20px; color: var(--text-grey); cursor: pointer;"></i>
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=Darul+Islam&background=f0f0f0&color=333" width="40"
                            height="40" alt="Darul Islam">
                        <span>Darul Islam</span>
                        <i class="fa-solid fa-caret-down" style="cursor: pointer; margin-left: 5px;"></i>
                    </div>
                </div>
            </header>

            <section class="resources-card">
                <div class="rc-header">
                    <h2>My Resources</h2>
                    <button class="btn-primary" id="addCategoryBtn"><i class="fa-solid fa-plus"></i> Add New
                        Category</button>
                </div>

                <div class="rc-horizontal-nav" id="mediumNav">
                    <button class="nav-btn active" data-medium="Bangla Medium">Bangla Medium</button>
                    <button class="nav-btn" data-medium="English Version">English Version</button>
                    <button class="nav-btn" data-medium="English Medium">English Medium</button>
                    <button class="nav-btn" data-medium="Madrasa Medium">Madrasa Medium</button>
                    <button class="nav-btn" data-medium="Skill Development">Skill Development</button>
                </div>

                <hr class="rc-divider">

                <div class="classes-grid" id="mainContentGrid">
                    <!-- Dynamic classes injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Popups -->
    <div class="modal-overlay" id="popModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Title</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body-grid" id="modalBodyGrid">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script>
        const classesData = {
            "Bangla Medium": ["Play", "Nursery", "Zero", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9 & 10", "Class 11 & 12", "University Admission"],
            "English Version": ["Play", "Nursery", "Zero", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9 & 10", "Class 11 & 12", "University Admission"],
            "English Medium": ["Zero", "Nursery", "Play", "Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "Level 6", "Level 7", "Level 8", "Level 9", "O Level", "A Level"],
            "Madrasa Medium": ["Play", "Nursery", "Zero", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9 & 10", "Class 11 & 12", "University Admission"],
            "Skill Development": ["Web Development", "Graphic Design", "Digital Marketing", "Spoken English", "Video Editing", "Python Programming"]
        };

        const standardSubjects = ["Bangla", "English", "Mathematics", "Science", "BDGS", "Religion", "ICT"];

        const generalSubs9_10 = ["Bangla", "English", "General Math", "ICT", "Religions", "BDGS", "Agriculture"];
        const sciSubs9_10 = ["Physics", "Chemistry", "Biology", "Higher Math", ...generalSubs9_10];
        const artsSubs9_10 = ["Geography", "History", "Civics", "Economics", ...generalSubs9_10];
        const comSubs9_10 = ["Accounting", "Finance", "Business Enterprise", ...generalSubs9_10];

        const generalSubs11_12 = ["Bangla 1 & 2", "English 1 & 2", "ICT"];
        const sciSubs11_12 = ["Physics 1 & 2", "Chemistry 1 & 2", "Biology 1 & 2", "Math 1 & 2", ...generalSubs11_12];
        const artsSubs11_12 = ["History", "Logic", "Civics", "Economics", "Sociology", ...generalSubs11_12];
        const comSubs11_12 = ["Accounting", "Business Organization", "Finance", "Economics", ...generalSubs11_12];

        const enMedSecondarySubs = ["Mathematics D", "Additional Mathematics", "Physics", "Chemistry", "Biology", "English Language", "Accounting", "Business Studies", "Economics", "Computer Science"];

        const chaptersList = Array.from({ length: 20 }, (_, i) => `Chapter ${i + 1}`);

        document.addEventListener('DOMContentLoaded', () => {
            const mediumBtns = document.querySelectorAll('#mediumNav .nav-btn');
            const mainGrid = document.getElementById('mainContentGrid');
            const modalOverlay = document.getElementById('popModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBodyGrid');
            const closeModalBtn = document.querySelector('.close-modal');

            let currentMedium = "Bangla Medium";
            let currentClass = "";
            let currentSubject = "";
            let currentGroup = "";

            function renderClasses() {
                mainGrid.innerHTML = '';
                const list = classesData[currentMedium] || [];
                list.forEach(cls => {
                    const btn = document.createElement('button');
                    btn.className = 'dd-btn';
                    btn.innerHTML = `${cls} <i class="fa-solid fa-caret-right dd-arrow"></i>`;

                    if (currentMedium === "Skill Development") {
                        btn.onclick = () => openSkillLink(cls);
                    } else if (["Class 9 & 10", "Class 11 & 12", "University Admission"].includes(cls)) {
                        btn.onclick = () => openGroupPopup(cls);
                    } else {
                        btn.onclick = () => openSubjectsPopup(cls);
                    }

                    mainGrid.appendChild(btn);
                });
            }

            mediumBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    mediumBtns.forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentMedium = e.currentTarget.getAttribute('data-medium');
                    renderClasses();
                });
            });

            function openModal(title, contentHTML, isLink = false) {
                modalTitle.textContent = title;
                modalBody.innerHTML = contentHTML;
                modalBody.style.display = isLink ? 'block' : 'grid';
                modalOverlay.classList.add('active');
            }

            closeModalBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('active');
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                }
            });

            window.openGroupPopup = function (cls) {
                currentClass = cls;
                currentGroup = "";
                const groups = ["Science", "Arts", "Commerce"];
                let html = '';
                groups.forEach(g => {
                    html += `<button class="dd-btn" onclick="openSubjectsPopup('${cls}', '${g}')">${g} <i class="fa-solid fa-caret-right dd-arrow"></i></button>`;
                });
                openModal(`Groups for ${cls}`, html);
            }

            window.openSubjectsPopup = function (cls, group = "") {
                currentClass = cls;
                currentGroup = group;
                let subs = standardSubjects;

                if (group) {
                    if (cls === "Class 9 & 10") {
                        if (group === "Science") subs = sciSubs9_10;
                        if (group === "Arts") subs = artsSubs9_10;
                        if (group === "Commerce") subs = comSubs9_10;
                    } else if (cls === "Class 11 & 12" || cls === "University Admission") {
                        if (group === "Science") subs = sciSubs11_12;
                        if (group === "Arts") subs = artsSubs11_12;
                        if (group === "Commerce") subs = comSubs11_12;
                    }
                } else if (currentMedium === "English Medium" && ["Level 9", "O Level", "A Level"].includes(cls)) {
                    subs = enMedSecondarySubs;
                }

                let html = '';
                subs.forEach(sub => {
                    html += `<button class="dd-btn" onclick="openChaptersPopup('${sub}')">${sub} <i class="fa-solid fa-caret-right dd-arrow"></i></button>`;
                });
                const titleStr = group ? `${group} Subjects (${cls})` : `Subjects for ${cls}`;
                openModal(titleStr, html);
            }

            window.openChaptersPopup = function (sub) {
                currentSubject = sub;
                let html = '';
                chaptersList.forEach(chap => {
                    html += `<button class="dd-btn" onclick="openLinkPopup('${chap}')">${chap} <i class="fa-solid fa-caret-right dd-arrow"></i></button>`;
                });
                openModal(`Chapters for ${sub}`, html);
            }

            window.openLinkPopup = function (chap) {
                const safeClass = currentClass.replace(/\s+/g, '').toLowerCase();
                const safeSub = currentSubject.replace(/\s+/g, '').toLowerCase();
                const safeChap = chap.replace(/\s+/g, '').toLowerCase();
                const link = `https://www.youtube.com/easytechnique/${safeClass}/${safeSub}/${safeChap}`;

                const html = `
                    <div class="lecture-link-box">
                        <i class="fa-solid fa-link" style="color: var(--primary-color); font-size: 24px; margin-bottom: 10px; display: block;"></i>
                        <p style="margin-bottom: 5px; font-weight: 500;">Lecture Link for ${chap}</p>
                        <a href="${link}" target="_blank">${link}</a>
                    </div>
                `;
                openModal(`${chap} - ${currentSubject}`, html, true);
            }

            window.openSkillLink = function (skill) {
                const safeSkill = skill.replace(/\s+/g, '').toLowerCase();
                const link = `https://www.youtube.com/easytechnique/skills/${safeSkill}`;
                const html = `
                    <div class="lecture-link-box">
                        <i class="fa-solid fa-link" style="color: var(--primary-color); font-size: 24px; margin-bottom: 10px; display: block;"></i>
                        <p style="margin-bottom: 5px; font-weight: 500;">Resources for ${skill}</p>
                        <a href="${link}" target="_blank">${link}</a>
                    </div>
                `;
                openModal(skill, html, true);
            }

            const addCategoryBtn = document.getElementById('addCategoryBtn');
            addCategoryBtn.addEventListener('click', () => {
                const html = `
                    <div style="grid-column: 1 / -1; padding-top: 10px;">
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: var(--text-dark);">Category Name</label>
                            <input type="text" id="newCatName" placeholder="e.g. Vocational Training" style="width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 14px; outline: none;">
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: var(--text-dark);">Classes / Sub-Categories (comma separated)</label>
                            <input type="text" id="newCatClasses" placeholder="e.g. Basics, Advanced, Projects" style="width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 14px; outline: none;">
                        </div>
                        <button onclick="saveNewCategory()" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Save Category</button>
                    </div>
                `;
                openModal('Add New Category', html, true);
            });

            window.saveNewCategory = function () {
                const nameInput = document.getElementById('newCatName');
                const classesInput = document.getElementById('newCatClasses');
                const catName = nameInput.value.trim();

                if (!catName) {
                    nameInput.style.borderColor = 'red';
                    return;
                }

                const classesStr = classesInput.value.trim();
                let classesArray = ["Default Level 1", "Default Level 2"];
                if (classesStr) {
                    classesArray = classesStr.split(',').map(s => s.trim()).filter(s => s);
                }

                classesData[catName] = classesArray;

                const navBtn = document.createElement('button');
                navBtn.className = 'nav-btn';
                navBtn.setAttribute('data-medium', catName);
                navBtn.textContent = catName;

                navBtn.addEventListener('click', (e) => {
                    const mediumBtnsDom = document.querySelectorAll('#mediumNav .nav-btn');
                    mediumBtnsDom.forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentMedium = e.currentTarget.getAttribute('data-medium');
                    renderClasses();
                });

                document.getElementById('mediumNav').appendChild(navBtn);

                // Set the current medium to the new category and render
                navBtn.click();
                modalOverlay.classList.remove('active');
            }

            // Init
            renderClasses();
        });
    </script>

</body>

</html>
