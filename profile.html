<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudy - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="profile-page"> <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <h2>Estudy</h2>
            </div>
            <nav class="menu">
                <a href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="courses.html"><i class="fa-regular fa-file-lines"></i> Course</a>
                <a href="#"><i class="fa-regular fa-bookmark"></i> Resources</a>
                <a href="chat.html"><i class="fa-regular fa-comment-dots"></i> Chat</a>
                <a href="schedule.html"><i class="fa-regular fa-calendar"></i> Schedule</a>
                <a href="profile.html" class="active"><i class="fa-regular fa-user"></i> Profile</a>
            </nav>
        </aside>

        <aside class="profile-card-col">
            <h2>Profile</h2>
            <div class="profile-avatar-section">
                <img src="https://via.placeholder.com/100" class="profile-avatar-large">
                <h3>Martin Nel</h3>
                <span class="vip-badge">VIP</span>
            </div>

            <div class="profile-stats">
                <div class="stat-item">
                    <h3>08</h3>
                    <span>In Progress</span>
                </div>
                <div class="stat-item">
                    <h3>23</h3>
                    <span>Completed</span>
                </div>
            </div>

            <div class="menu">
                <a href="#"><i class="fa-regular fa-user"></i> Become a Mentor</a>
                <a href="#"><i class="fa-solid fa-life-ring"></i> Support</a>
                <a href="#"><i class="fa-solid fa-user-plus"></i> Invite Friend</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1>Profile Setting</h1>
                <div class="user-info">
                     <img src="https://via.placeholder.com/40">
                     Martin Nel
                </div>
            </header>

            <div class="settings-form-area">
                <div class="form-section-nav">
                    <span class="active">Personal Details</span>
                    <span>Notification</span>
                    <span>Privacy</span>
                    <span>Payment</span>
                </div>

                <form>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" value="Mashok khan">
                        </div>
                         <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" value="hellopixency@gmail.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" value="127 Gobadia chittagong, Bangladesh">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" value="Chittagong">
                        </div>
                         <div class="form-group">
                            <label>Country</label>
                            <select><option>Bangladesh</option></select>
                        </div>
                    </div>

                    <div class="form-row">
                         <div class="form-group">
                            <button type="button" class="btn-save">Save Profile</button>
                            <button type="button" class="btn-cancel">Cancel</button>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
